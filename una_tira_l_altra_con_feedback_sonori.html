<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una Tira l'Altra</title>
    <!-- Caricamento Tailwind e Font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            overflow-x: hidden;
        }
        h1, .font-display {
            font-family: 'Montserrat', sans-serif;
        }
        .container {
            max-width: 800px;
        }
        .title-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .word-input {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 2px solid #e5e7eb;
            background-color: #ffffff;
            font-size: 1.125rem;
            text-align: center;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }
        .word-input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }
        .message-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            color: white;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }
        .message-box.show {
            opacity: 1;
        }
        .message-box.success { background-color: #10b981; }
        .message-box.error { background-color: #ef4444; }
        .message-box.info { background-color: #3b82f6; }

        .button {
            font-family: 'Montserrat', sans-serif;
            transition: all 0.2s ease-in-out;
        }
        .button:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #hit-counter {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #6b7280;
            border: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 50;
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Contatore Accessi -->
    <div id="hit-counter">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>Accessi: <span id="access-count">...</span></span>
    </div>

    <!-- 1. SETUP MENU -->
    <div id="setup-container" class="container bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-gray-100 text-center mx-auto fade-in">
        <h1 class="text-5xl md:text-7xl font-black mb-4 tracking-tighter title-gradient">
            Una tira l'altra
        </h1>
        <p class="text-gray-500 mb-10 text-lg font-medium italic">"Sfida la tua mente, una parola alla volta"</p>
        
        <p class="text-gray-400 text-xs font-black uppercase tracking-widest mb-6">Scegli la difficoltà</p>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <button onclick="window.startGame('base')" class="button bg-emerald-500 text-white font-extrabold py-8 px-6 rounded-2xl shadow-lg shadow-emerald-100">
                BASE
            </button>
            <button onclick="window.startGame('intermedio')" class="button bg-amber-500 text-white font-extrabold py-8 px-6 rounded-2xl shadow-lg shadow-amber-100">
                INTERMEDIO
            </button>
            <button onclick="window.startGame('avanzato')" class="button bg-rose-500 text-white font-extrabold py-8 px-6 rounded-2xl shadow-lg shadow-rose-100">
                AVANZATO
            </button>
        </div>
    </div>

    <!-- 2. GAME SCREEN -->
    <div id="game-container" class="container bg-white p-6 md:p-10 rounded-3xl shadow-xl border border-gray-100 hidden mx-auto fade-in">
        <div class="flex justify-between items-center mb-8">
            <button onclick="window.confirmExit()" class="text-gray-400 hover:text-rose-500 text-xs font-black tracking-widest transition-colors">
                ABBANDONA
            </button>
            <div class="flex items-center gap-3">
                <div class="bg-indigo-100 text-indigo-700 px-4 py-1.5 rounded-full font-mono font-bold text-lg" id="timer-display">00:00</div>
            </div>
            <button onclick="window.finishSession()" class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-full text-xs font-black tracking-widest hover:bg-indigo-600 hover:text-white transition-all uppercase">
                Fine Sessione
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 text-center">
                <span class="block text-[10px] uppercase font-black text-emerald-400 mb-1">Corrette</span>
                <span id="score-correct" class="text-3xl font-black text-emerald-600">0</span>
            </div>
            <div class="bg-rose-50 p-4 rounded-2xl border border-rose-100 text-center">
                <span class="block text-[10px] uppercase font-black text-rose-400 mb-1">Sbagliate</span>
                <span id="score-wrong" class="text-3xl font-black text-rose-600">0</span>
            </div>
        </div>

        <div id="words-container" class="space-y-6"></div>

        <div class="mt-10 flex flex-col items-center">
            <button id="next-btn" class="button bg-indigo-600 text-white font-black py-4 px-12 rounded-full text-lg shadow-lg shadow-indigo-100 hidden uppercase tracking-wider">
                Prossima Catena
            </button>
        </div>
    </div>

    <!-- 3. REPORT SCREEN -->
    <div id="report-container" class="container bg-white p-10 rounded-3xl shadow-xl border border-gray-100 hidden mx-auto text-center fade-in">
        <h2 class="text-4xl font-black text-gray-900 mb-2">Sessione Conclusa</h2>
        <p class="text-gray-400 font-medium mb-8 uppercase tracking-widest text-sm">Riepilogo Risultati</p>

        <div class="bg-gray-50 rounded-3xl p-8 mb-8 grid grid-cols-1 md:grid-cols-3 gap-8 border border-gray-100">
            <div class="p-4">
                <p class="text-gray-400 text-xs font-black mb-2 uppercase">Tempo Totale</p>
                <p id="final-time" class="text-3xl font-black text-indigo-600">--</p>
            </div>
            <div class="p-4 border-y md:border-y-0 md:border-x border-gray-200">
                <p class="text-gray-400 text-xs font-black mb-2 uppercase">Risposte Esatte</p>
                <p id="final-correct" class="text-3xl font-black text-emerald-600">0</p>
            </div>
            <div class="p-4">
                <p class="text-gray-400 text-xs font-black mb-2 uppercase">Risposte Errate</p>
                <p id="final-wrong" class="text-3xl font-black text-rose-600">0</p>
            </div>
        </div>

        <button onclick="window.showSetup()" class="button bg-gray-900 text-white font-black py-5 px-12 rounded-2xl text-lg w-full md:w-auto hover:bg-black uppercase tracking-widest">
            Nuova Sessione
        </button>
    </div>

    <div id="message-box" class="message-box shadow-2xl"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- Sintesi Audio ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;

            if (type === 'success') {
                // Suono armonico ascendente
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, now); // C5
                oscillator.frequency.exponentialRampToValueAtTime(880, now + 0.15); // A5
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                oscillator.start(now);
                oscillator.stop(now + 0.3);
            } else if (type === 'error') {
                // Suono basso e smorzato
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(220, now); // A3
                oscillator.frequency.linearRampToValueAtTime(110, now + 0.1); // A2
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.2);
                oscillator.start(now);
                oscillator.stop(now + 0.2);
            }
        }

        const DB = {
            base: [
                ["SOLE", "CALDO", "GHIACCIO", "FREDDO", "INVERNO", "NEVE", "MONTAGNA"],
                ["PANE", "FRESCO", "ARIA", "PULITO", "SAPONE", "BAGNO", "DOCCIA"],
                ["GATTO", "PELO", "LANA", "MAGLIONE", "CALDO", "FUOCO", "CAMINO"],
                ["MARE", "SABBIA", "CASTELLO", "RE", "CORONA", "TESTA", "CAPPELLO"],
                ["LIBRO", "PAGINA", "SCRITTURA", "PENNA", "INCHIOSTRO", "NERO", "NOTTE"],
                ["CAFFÈ", "TAZZINA", "ZUCCHERO", "DOLCE", "TORTA", "FESTA", "REGALO"],
                ["MELA", "ROSSA", "FRUTTO", "ALBERO", "RAMO", "FOGLIA", "VERDE"],
                ["TRENO", "BINARIO", "STAZIONE", "VIAGGIO", "VALIGIA", "VACANZA", "ESTATE"],
                ["PALLA", "GIOCO", "BAMBINO", "PARCO", "ERBA", "PRATO", "FIORE"],
                ["ACQUA", "SETE", "BICCHIERE", "TAVOLA", "CENA", "PIATTO", "CUCINA"],
                ["CASA", "PORTA", "CHIAVE", "SERRATURA", "FERRO", "METALLO", "ORO"],
                ["LATTE", "BIANCO", "NUVOLA", "PIOGGIA", "OMBRELLO", "VENTO", "TEMPESTA"],
                ["SCARPA", "PIEDE", "CAMMINO", "STRADA", "AUTO", "RUOTA", "BICICLETTA"],
                ["OROLOGIO", "TEMPO", "MINUTO", "SECONDO", "PIATTO", "CENA", "FESTA"],
                ["MUSICA", "CANZONE", "VOCE", "PAROLA", "LETTERA", "BUSTA", "POSTA"]
            ],
            intermedio: [
                ["LINGUA", "PAROLA", "VOCABOLARIO", "INDICE", "BORSA", "MERCATO", "AFFARI"],
                ["MISTERO", "OMBRA", "LUCE", "RIFLESSO", "SPECCHIO", "IMMAGINE", "FOTO"],
                ["TEATRO", "PALCO", "SIPARIO", "ATTREZZO", "CHIAVE", "SERRATURA", "PORTA"],
                ["STAMPA", "QUOTIDIANO", "NOTIZIA", "ULTIMA", "SPIAGGIA", "MARE", "ONDA"],
                ["MUSICA", "SPETTACOLO", "PUBBLICO", "RELAZIONE", "COPPIA", "CUORE", "AMORE"],
                ["MEMORIA", "ELEFANTE", "AVORIO", "BIANCO", "LATTE", "CENTRALE", "POLIZIA"],
                ["GIUDICE", "LEGGE", "DIRITTO", "ROVESCIO", "TENNIS", "RETE", "SISTEMA"],
                ["ORIZZONTE", "DISTANZA", "LONTANO", "VICINO", "CASA", "SICUREZZA", "ALLARME"],
                ["ENERGIA", "CORRENTE", "FIUME", "VALLE", "MONTAGNA", "ALTA", "QUOTA"],
                ["SCACCHI", "REGINA", "APE", "MIELE", "DOLCE", "ZUCCHERO", "VELENO"],
                ["VIAGGIO", "METRO", "LINEA", "CONFINE", "STATO", "GOVERNO", "POTERE"],
                ["NAVIGAZIONE", "PORTA", "ACCESSO", "PASSWORD", "SEGRETO", "CODICE", "FISSA"],
                ["CIRCO", "PAGLIACCIO", "TRUCCO", "VISAGISTA", "ESTETISTA", "BELEZZA", "GRAZIA"]
            ],
            avanzato: [
                ["ALGORITMO", "LOGICA", "DEDUZIONE", "INVESTIGATORE", "LENTE", "CONTATTO", "OCCHIO"],
                ["PROSPETTIVA", "PUNTO", "RELAZIONE", "LEGAME", "NODO", "GOLA", "AMARO"],
                ["METAMORFOSI", "CAMBIAMENTO", "STATO", "CIVILE", "ABITO", "SU MISURA", "PESO"],
                ["ARCHITETTO", "PROGETTO", "FUTURO", "DESTINO", "CASUALITÀ", "ORDINE", "DISCIPLINA"],
                ["SOCIETÀ", "CONTRATTO", "FIRMA", "AUTORE", "OPERA", "LIRICA", "VOCE"],
                ["EVOLUZIONE", "SPECIE", "TIPO", "CARATTERE", "TRATTO", "PENNA", "STILO"],
                ["LINGUISTICA", "SEMANTICA", "SIGNIFICATO", "PROFONDO", "ROSSO", "SANGUE", "FREDDO"],
                ["ASTRONOMIA", "COSTELLAZIONE", "ORSA", "MAGGIORE", "ETÀ", "MEDIA", "VOTO"],
                ["ECONOMIA", "VALUTA", "SCAMBIO", "OPINIONE", "PUBBLICA", "RELAZIONE", "STAMPA"],
                ["BIOLOGIA", "CELLULA", "NUCLEO", "CENTRALE", "POLIZIA", "ORDINE", "ARCHIVIO"],
                ["PARADOSSO", "TEMPO", "DIMENSIONE", "GRANDEZZA", "SPIRITO", "GUIDA", "TURISTICA"],
                ["CHIMICA", "ELEMENTO", "TAVOLA", "PERIODICA", "DOVERE", "CRONACA", "NERA"],
                ["GEOLOGIA", "STRATO", "ATMOSFERA", "PRESSIONE", "SANGUE", "FREDDO", "MARMO"]
            ]
        };

        const firebaseConfig = JSON.parse(__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'una-tira-l-altra-final';
        let user = null;

        const initHitCounter = async () => {
            if (!user) return;
            const counterRef = doc(db, 'artifacts', appId, 'public', 'data', 'counters', 'access');
            try {
                const snap = await getDoc(counterRef);
                if (!snap.exists()) await setDoc(counterRef, { count: 1 });
                else await updateDoc(counterRef, { count: increment(1) });
                onSnapshot(counterRef, s => {
                    const data = s.data();
                    if (data) document.getElementById('access-count').textContent = data.count.toLocaleString();
                });
            } catch (err) { console.warn("Counter disabled"); }
        };

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
            else await signInAnonymously(auth);
        };

        onAuthStateChanged(auth, u => { user = u; if (user) initHitCounter(); });
        initAuth();

        let currentDiff = 'base';
        let sequence = [];
        let revealed = [];
        let hints = [];
        let stats = { correct: 0, wrong: 0, startTime: 0, timerInterval: null };

        const UI = {
            setup: document.getElementById('setup-container'),
            game: document.getElementById('game-container'),
            report: document.getElementById('report-container'),
            words: document.getElementById('words-container'),
            msg: document.getElementById('message-box'),
            timer: document.getElementById('timer-display'),
            scoreC: document.getElementById('score-correct'),
            scoreW: document.getElementById('score-wrong'),
            nextBtn: document.getElementById('next-btn')
        };

        window.showSetup = () => {
            clearInterval(stats.timerInterval);
            UI.setup.classList.remove('hidden');
            UI.game.classList.add('hidden');
            UI.report.classList.add('hidden');
        };

        window.startGame = (diff) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            currentDiff = diff;
            stats.correct = 0;
            stats.wrong = 0;
            stats.startTime = Date.now();
            updateStatsUI();
            startTimer();
            UI.setup.classList.add('hidden');
            UI.report.classList.add('hidden');
            UI.game.classList.remove('hidden');
            loadNewSequence();
        };

        const startTimer = () => {
            clearInterval(stats.timerInterval);
            stats.timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - stats.startTime) / 1000);
                const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const s = (elapsed % 60).toString().padStart(2, '0');
                UI.timer.textContent = `${m}:${s}`;
            }, 1000);
        };

        const loadNewSequence = () => {
            const pool = DB[currentDiff];
            sequence = pool[Math.floor(Math.random() * pool.length)].map(s => s.toUpperCase());
            revealed = [sequence[0], null, null, null, null, null, sequence[6]];
            hints = new Array(7).fill(0);
            UI.nextBtn.classList.add('hidden');
            renderWords();
        };

        const renderWords = () => {
            UI.words.innerHTML = '';
            revealed.forEach((word, i) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'w-full flex flex-col items-center gap-3 fade-in';
                
                if (word) {
                    itemDiv.innerHTML = `
                        <div class="w-full p-6 bg-indigo-50 border border-indigo-100 rounded-2xl text-center shadow-sm">
                            <span class="text-2xl md:text-3xl font-black text-indigo-700 font-display tracking-wide">${word}</span>
                        </div>
                    `;
                } else {
                    const correctWord = sequence[i];
                    const helpLetters = hints[i] + 1;
                    const displayHint = correctWord.substring(0, helpLetters).padEnd(correctWord.length, '_');
                    
                    itemDiv.innerHTML = `
                        <div class="w-full space-y-4">
                            <div class="text-center">
                                <span class="text-2xl md:text-3xl font-black text-gray-300 tracking-[0.4em] font-display uppercase">
                                    ${displayHint.split('').join(' ')}
                                </span>
                            </div>
                            <div class="max-w-xs mx-auto">
                                <input type="text" placeholder="Scrivi la parola..." 
                                    class="word-input" 
                                    onkeydown="if(event.key === 'Enter') window.checkWord(this.value, ${i})">
                            </div>
                        </div>
                    `;
                }
                UI.words.appendChild(itemDiv);
            });
        };

        window.checkWord = (val, i) => {
            const guess = val.trim().toUpperCase();
            if (guess === sequence[i]) {
                revealed[i] = sequence[i];
                stats.correct++;
                playSound('success');
                showMessage("ECCELLENTE!", "success");
                if (revealed.every(w => w !== null)) UI.nextBtn.classList.remove('hidden');
            } else {
                stats.wrong++;
                playSound('error');
                if (hints[i] < sequence[i].length - 1) hints[i]++;
                showMessage("NON PROPRIO...", "error");
            }
            updateStatsUI();
            renderWords();
        };

        const updateStatsUI = () => {
            UI.scoreC.textContent = stats.correct;
            UI.scoreW.textContent = stats.wrong;
        };

        window.finishSession = () => {
            clearInterval(stats.timerInterval);
            document.getElementById('final-time').textContent = UI.timer.textContent;
            document.getElementById('final-correct').textContent = stats.correct;
            document.getElementById('final-wrong').textContent = stats.wrong;
            UI.game.classList.add('hidden');
            UI.report.classList.remove('hidden');
        };

        window.confirmExit = () => {
            if (confirm("Vuoi davvero abbandonare la sessione attuale?")) window.showSetup();
        };

        const showMessage = (txt, type) => {
            UI.msg.textContent = txt;
            UI.msg.className = `message-box show ${type}`;
            setTimeout(() => UI.msg.className = `message-box`, 2000);
        };

        UI.nextBtn.onclick = loadNewSequence;
    </script>
</body>
</html>
