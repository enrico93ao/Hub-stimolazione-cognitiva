<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Attiva - Orientamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f8fafc;
            user-select: none;
            touch-action: manipulation;
            font-size: 1.25rem;
        }
        .drag-item {
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s, border-color 0.3s;
            touch-action: none;
        }
        .drag-item:active {
            cursor: grabbing;
            transform: scale(1.05);
        }
        .slot {
            min-height: 110px;
            border: 4px dashed #cbd5e1;
            transition: all 0.3s ease;
            background-color: #ffffff;
        }
        .slot.correct {
            border-style: solid;
            border-color: #16a34a;
            background-color: #f0fdf4;
            animation: pop 0.3s ease-out;
        }
        .slot.active-target {
            border-color: #3b82f6;
            background-color: #eff6ff;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            animation: pulse-border 1.5s infinite;
        }
        @keyframes pulse-border {
            0% { transform: scale(1); border-color: #3b82f6; }
            50% { transform: scale(1.02); border-color: #60a5fa; }
            100% { transform: scale(1); border-color: #3b82f6; }
        }
        .active-label {
            color: #1d4ed8;
            font-weight: 800;
            font-size: 0.75rem;
            animation: bounce 1s infinite;
        }
        .error-shake {
            animation: shake 0.4s;
            border-color: #ef4444 !important;
            background-color: #fee2e2 !important;
            color: #b91c1c !important;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .correct-text {
            color: #16a34a;
            font-weight: 800;
            font-size: 1.5rem;
            text-transform: uppercase;
        }
        .btn-large {
            transition: all 0.2s;
            border-bottom-width: 6px;
        }
        .btn-large:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
        }
        .hint-date-box {
            background-color: #fef3c7;
            border: 4px solid #f59e0b;
            color: #92400e;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-900">

    <header class="bg-indigo-700 text-white p-4 md:p-6 shadow-xl text-center">
        <div class="flex justify-between items-center max-w-6xl mx-auto">
            <div class="w-24 md:w-32">
                <button onclick="resetApp()" class="bg-indigo-800 hover:bg-indigo-900 px-3 py-2 md:px-4 md:py-3 rounded-xl text-xs font-bold border-b-4 border-indigo-950 flex items-center justify-center gap-2">
                    🏠 <span class="hidden sm:inline uppercase">Menu</span>
                </button>
            </div>
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight uppercase">Mente Attiva</h1>
            </div>
            <div class="w-24 md:w-32"></div> 
        </div>
    </header>

    <main id="app-container" class="flex-grow p-4 md:p-8 max-w-6xl mx-auto w-full">
        <!-- Contenuto dinamico inserito via JS -->
    </main>

    <script>
        const state = {
            step: 'difficulty', 
            difficulty: 'base',
            showHint: true,
            answers: { weekday: null, day: null, month: null, year: null, season: null },
            get activeSlotType() {
                const sequence = ['weekday', 'day', 'month', 'year', 'season'];
                return sequence.find(type => this.answers[type] === null);
            },
            get correctData() {
                const now = new Date();
                return {
                    weekday: now.toLocaleString('it-IT', { weekday: 'long' }).toLowerCase(),
                    day: now.getDate().toString(),
                    month: now.toLocaleString('it-IT', { month: 'long' }).toLowerCase(),
                    year: now.getFullYear().toString(),
                    season: getSeason()
                };
            }
        };

        const seasonsIcons = {
            primavera: '🌸', estate: '☀️', autunno: '🍂', inverno: '❄️'
        };

        function getSeason() {
            const month = new Date().getMonth();
            if (month >= 2 && month <= 4) return 'primavera';
            if (month >= 5 && month <= 7) return 'estate';
            if (month >= 8 && month <= 10) return 'autunno';
            return 'inverno';
        }

        function getTodayString() {
            const data = state.correctData;
            const items = [
                { label: 'GIORNO SETT.', val: data.weekday },
                { label: 'NUMERO', val: data.day },
                { label: 'MESE', val: data.month },
                { label: 'ANNO', val: data.year },
                { label: 'STAGIONE', val: seasonsIcons[data.season] + " " + data.season }
            ];

            return `
                <div class="flex flex-wrap justify-center gap-3 mt-2">
                    ${items.map(item => `
                        <div class="bg-white/70 px-4 py-2 rounded-2xl border-2 border-amber-400 min-w-[120px]">
                            <span class="text-[10px] block opacity-70 font-black uppercase text-amber-800">${item.label}</span>
                            <span class="text-xl md:text-2xl font-black uppercase">${item.val}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function playSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                
                if (type === 'success') {
                    // Accordo armonico "Ding-Ding"
                    const tones = [523.25, 659.25, 783.99]; // Accordo di Do Maggiore
                    tones.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(freq, ctx.currentTime + (i * 0.05));
                        gain.gain.setValueAtTime(0.1, ctx.currentTime + (i * 0.05));
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3 + (i * 0.05));
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.start(ctx.currentTime + (i * 0.05));
                        osc.stop(ctx.currentTime + 0.4 + (i * 0.05));
                    });
                } else if (type === 'error') {
                    // Tono basso e vibrante "Buzzer"
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(110, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                } else if (type === 'victory') {
                    // Fanfara finale
                    const melody = [523.25, 523.25, 523.25, 698.46];
                    melody.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(freq, ctx.currentTime + (i * 0.15));
                        gain.gain.setValueAtTime(0.05, ctx.currentTime + (i * 0.15));
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2 + (i * 0.15));
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.start(ctx.currentTime + (i * 0.15));
                        osc.stop(ctx.currentTime + 0.3 + (i * 0.15));
                    });
                }
            } catch(e) { console.error("Audio non supportato", e); }
        }

        function render() {
            const container = document.getElementById('app-container');
            container.innerHTML = '';
            switch(state.step) {
                case 'difficulty': renderDifficulty(container); break;
                case 'temporal': renderTemporal(container); break;
                case 'spatial-city': renderSpatialCity(container); break;
                case 'spatial-room': renderSpatialRoom(container); break;
                case 'spatial-map': renderSpatialMap(container); break;
                case 'final': renderFinal(container); break;
            }
        }

        function renderDifficulty(container) {
            container.innerHTML = `
                <div class="text-center mt-6">
                    <h2 class="text-3xl font-bold mb-10 text-slate-800">Seleziona il livello:</h2>
                    <div class="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                        <button onclick="setDifficulty('base')" class="btn-large bg-white border-green-600 p-10 rounded-3xl shadow-lg hover:bg-green-50 flex flex-col items-center">
                            <span class="text-7xl mb-4">🌟</span>
                            <span class="text-3xl font-extrabold text-green-700 uppercase">Base</span>
                            <p class="text-xl text-slate-600 mt-2 font-medium italic">Scelte facilitate</p>
                        </button>
                        <button onclick="setDifficulty('advanced')" class="btn-large bg-white border-blue-600 p-10 rounded-3xl shadow-lg hover:bg-blue-50 flex flex-col items-center">
                            <span class="text-7xl mb-4">🏆</span>
                            <span class="text-3xl font-extrabold text-blue-700 uppercase">Sfida</span>
                            <p class="text-xl text-slate-600 mt-2 font-medium italic">Più opzioni</p>
                        </button>
                    </div>
                </div>
            `;
        }

        function setDifficulty(level) {
            state.difficulty = level;
            state.step = 'temporal';
            render();
        }

        function renderTemporal(container) {
            const data = state.correctData;
            const count = state.difficulty === 'base' ? 2 : 4;
            
            const weekdayOptions = generateOptions(data.weekday, count, 'weekday').map(v => ({val: v, type: 'weekday'}));
            const dayOptions = generateOptions(data.day, count, 'number').map(v => ({val: v, type: 'day'}));
            const monthOptions = generateOptions(data.month, count, 'month').map(v => ({val: v, type: 'month'}));
            const yearOptions = generateOptions(data.year, count, 'year').map(v => ({val: v, type: 'year'}));
            const seasonOptions = ['primavera', 'estate', 'autunno', 'inverno'].map(v => ({val: v, type: 'season'}));

            const allDraggables = shuffle([...weekdayOptions, ...dayOptions, ...monthOptions, ...yearOptions, ...seasonOptions]);

            const sequence = ['weekday', 'day', 'month', 'year', 'season'];
            const labels = {
                weekday: 'Giorno Sett.',
                day: 'Numero',
                month: 'Mese',
                year: 'Anno',
                season: 'Stagione'
            };
            const activeSlotType = state.activeSlotType;

            container.innerHTML = `
                <div class="space-y-6">
                    <div class="flex flex-col sm:flex-row justify-between items-center bg-indigo-50 p-4 rounded-2xl border-2 border-indigo-200 gap-4">
                        <span class="font-black text-indigo-900 uppercase text-center md:text-left">Esercizio: Che giorno è oggi?</span>
                        <button onclick="toggleHint()" class="bg-white hover:bg-slate-100 text-indigo-700 px-6 py-2 rounded-xl text-sm font-black shadow-sm border-2 border-indigo-300 uppercase w-full sm:w-auto">
                            ${state.showHint ? '👁️ Nascondi Aiuto' : '👁️ Mostra Aiuto'}
                        </button>
                    </div>

                    <div id="hint-box" class="${state.showHint ? '' : 'hidden'} hint-date-box p-4 rounded-3xl text-center shadow-lg">
                        <span class="text-xs font-black uppercase opacity-60 block mb-2 tracking-widest">Guarda qui per la risposta:</span>
                        ${getTodayString()}
                    </div>

                    <div class="bg-white p-6 rounded-3xl border-4 border-slate-200 shadow-sm overflow-x-auto">
                        <div class="flex flex-nowrap md:grid md:grid-cols-5 gap-3 min-w-[600px] md:min-w-0">
                            ${sequence.map(type => {
                                const isActive = type === activeSlotType;
                                const isCorrect = state.answers[type] !== null;
                                return `
                                <div class="space-y-2 flex-1">
                                    <label class="text-[10px] font-black uppercase ml-2 block h-4 ${isActive ? 'active-label' : 'text-slate-400'}">
                                        ${labels[type]}
                                    </label>
                                    <div id="slot-${type}" 
                                         class="slot w-full rounded-2xl flex items-center justify-center text-center p-2 ${isActive ? 'active-target' : ''} ${isCorrect ? 'correct' : ''}"
                                         ondrop="drop(event, '${type}')" 
                                         ondragover="allowDrop(event)">
                                        ${state.answers[type] ? `<span class="correct-text">${state.answers[type].toUpperCase()}</span>` : '<span class="text-slate-300 font-bold uppercase text-[10px]">Vuoto</span>'}
                                    </div>
                                </div>
                            `}).join('')}
                        </div>
                    </div>

                    <div class="bg-slate-200 p-6 rounded-[2.5rem] shadow-inner">
                        <p class="text-center text-slate-500 font-bold mb-4 uppercase text-sm">Tocca o trascina la tessera corretta:</p>
                        <div class="flex flex-wrap justify-center gap-3">
                            ${allDraggables.map((item, idx) => {
                                const val = item.val;
                                const type = item.type;
                                const isUsed = state.answers[type] === val;
                                // Nel livello base evidenziamo anche la tessera suggerita se vogliamo (opzionale)
                                return `
                                <div id="drag-${idx}" 
                                     draggable="true" 
                                     ondragstart="drag(event)" 
                                     onclick="handleSelection('${idx}', '${val}', '${type}')"
                                     data-value="${val}"
                                     data-type="${type}"
                                     style="${isUsed ? 'display:none' : ''}"
                                     class="drag-item bg-white border-4 border-slate-300 px-5 py-3 rounded-2xl text-lg font-black text-slate-800 shadow-md active:bg-indigo-100 uppercase">
                                    ${state.difficulty === 'base' && seasonsIcons[val.toLowerCase()] ? seasonsIcons[val.toLowerCase()] + ' ' : ''}${val}
                                </div>
                            `}).join('')}
                        </div>
                    </div>

                    <div id="temporal-next" class="${checkComplete() ? '' : 'hidden'} text-center mt-6">
                         <button onclick="state.step = 'spatial-city'; render();" class="btn-large bg-green-600 border-green-800 text-white px-12 py-5 rounded-full text-2xl font-black shadow-xl animate-bounce">
                            BRAVO! VAI AVANTI →
                         </button>
                    </div>
                </div>
            `;
        }

        function handleSelection(id, val, type) {
            const dragEl = document.getElementById(`drag-${id}`);
            const activeSlot = state.activeSlotType;
            const correctValue = state.correctData[type].toLowerCase();

            // Controllo 1: L'utente sta provando a riempire la casella corretta in sequenza?
            if (type !== activeSlot) {
                playSound('error');
                if(dragEl) {
                    dragEl.classList.add('error-shake');
                    setTimeout(() => dragEl.classList.remove('error-shake'), 400);
                }
                // Opzionale: feedback visivo sullo slot che dovrebbe essere riempito
                const targetSlot = document.getElementById(`slot-${activeSlot}`);
                if(targetSlot) {
                    targetSlot.classList.add('error-shake');
                    setTimeout(() => targetSlot.classList.remove('error-shake'), 400);
                }
                return;
            }

            // Controllo 2: Il valore è quello corretto?
            if (val.toLowerCase() === correctValue) {
                state.answers[type] = val;
                playSound('success');
                render(); 
            } else {
                playSound('error');
                if(dragEl) {
                    dragEl.classList.add('error-shake');
                    setTimeout(() => dragEl.classList.remove('error-shake'), 400);
                }
            }
        }

        function drag(ev) {
            ev.dataTransfer.setData("id", ev.target.id);
            ev.dataTransfer.setData("value", ev.target.getAttribute('data-value'));
            ev.dataTransfer.setData("type", ev.target.getAttribute('data-type'));
        }

        function allowDrop(ev) { ev.preventDefault(); }

        function drop(ev, slotType) {
            ev.preventDefault();
            const id = ev.dataTransfer.getData("id");
            const val = ev.dataTransfer.getData("value");
            const draggedType = ev.dataTransfer.getData("type");

            // Verifichiamo che il tipo trascinato sia quello dello slot corrente e che sia il valore corretto
            if (draggedType === slotType && slotType === state.activeSlotType) {
                handleSelection(id.replace('drag-', ''), val, slotType);
            } else {
                const dragEl = document.getElementById(id);
                playSound('error');
                if(dragEl) {
                    dragEl.classList.add('error-shake');
                    setTimeout(() => dragEl.classList.remove('error-shake'), 400);
                }
            }
        }

        function drag(ev) {
            ev.dataTransfer.setData("id", ev.target.id);
            ev.dataTransfer.setData("value", ev.target.getAttribute('data-value'));
            ev.dataTransfer.setData("type", ev.target.getAttribute('data-type'));
        }

        function allowDrop(ev) { ev.preventDefault(); }

        function drop(ev, slotType) {
            ev.preventDefault();
            const id = ev.dataTransfer.getData("id");
            const val = ev.dataTransfer.getData("value");
            const draggedType = ev.dataTransfer.getData("type");

            if (draggedType === slotType && val.toLowerCase() === state.correctData[slotType].toLowerCase()) {
                handleSelection(id.replace('drag-', ''), val, slotType);
            } else {
                const dragEl = document.getElementById(id);
                playSound('error');
                dragEl.classList.add('error-shake');
                setTimeout(() => dragEl.classList.remove('error-shake'), 400);
            }
        }

        function checkComplete() {
            return Object.values(state.answers).every(v => v !== null);
        }

        function toggleHint() {
            state.showHint = !state.showHint;
            const hintBox = document.getElementById('hint-box');
            if (hintBox) {
                hintBox.classList.toggle('hidden');
                render(); // Ricarichiamo per aggiornare il testo del bottone
            }
        }

        function renderSpatialCity(container) {
            const cities = state.difficulty === 'base' ? ['Roma', 'Milano'] : ['Roma', 'Venezia', 'Napoli'];
            container.innerHTML = `
                <div class="space-y-8 text-center">
                    <div class="bg-blue-50 p-6 rounded-3xl border-4 border-blue-200">
                        <h2 class="text-3xl font-extrabold text-blue-900 uppercase">In quale città ti trovi?</h2>
                        <p class="text-xl text-blue-700 mt-2 font-medium">Seleziona la risposta esatta.</p>
                    </div>
                    <div class="grid gap-4 max-w-md mx-auto">
                        ${cities.map(city => `
                            <button onclick="checkCity('${city}', 'Roma')" id="btn-${city}" 
                                class="btn-large bg-white border-slate-300 p-6 rounded-2xl text-2xl font-black hover:bg-blue-50 uppercase">
                                ${city}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function checkCity(selected, correct) {
            const btn = document.getElementById(`btn-${selected}`);
            if (selected === correct) {
                btn.className = "btn-large bg-green-600 border-green-800 text-white p-6 rounded-2xl text-2xl font-black uppercase";
                playSound('success');
                setTimeout(() => { state.step = 'spatial-room'; render(); }, 800);
            } else {
                btn.classList.add('error-shake');
                playSound('error');
                setTimeout(() => btn.classList.remove('error-shake'), 400);
            }
        }

        function renderSpatialRoom(container) {
            container.innerHTML = `
                <div class="space-y-8 text-center">
                    <div class="bg-purple-50 p-6 rounded-3xl border-4 border-purple-200">
                        <h2 class="text-3xl font-extrabold text-purple-900 uppercase">Dove si lavano i denti?</h2>
                    </div>
                    <div class="grid md:grid-cols-3 gap-6 max-w-4xl mx-auto">
                        <button onclick="checkRoom('bagno')" id="room-bagno" class="btn-large bg-white border-slate-300 p-8 rounded-3xl flex flex-col items-center">
                            <span class="text-7xl mb-4">🛁</span>
                            <span class="text-xl font-black uppercase">Il Bagno</span>
                        </button>
                        <button onclick="checkRoom('cucina')" id="room-cucina" class="btn-large bg-white border-slate-300 p-8 rounded-3xl flex flex-col items-center">
                            <span class="text-7xl mb-4">🍳</span>
                            <span class="text-xl font-black uppercase">La Cucina</span>
                        </button>
                        <button onclick="checkRoom('camera')" id="room-camera" class="btn-large bg-white border-slate-300 p-8 rounded-3xl flex flex-col items-center">
                            <span class="text-7xl mb-4">🛏️</span>
                            <span class="text-xl font-black uppercase">La Camera</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function checkRoom(room) {
            const el = document.getElementById(`room-${room}`);
            if (room === 'bagno') {
                el.className = "btn-large bg-green-100 border-green-600 p-8 rounded-3xl flex flex-col items-center shadow-lg";
                playSound('success');
                setTimeout(() => { state.step = 'spatial-map'; render(); }, 800);
            } else {
                el.classList.add('error-shake');
                playSound('error');
                setTimeout(() => el.classList.remove('error-shake'), 400);
            }
        }

        function renderSpatialMap(container) {
            container.innerHTML = `
                <div class="space-y-8">
                    <div class="bg-orange-50 p-6 rounded-3xl border-4 border-orange-200 text-center">
                        <h2 class="text-3xl font-extrabold text-orange-900 uppercase">Mappa della casa</h2>
                        <p class="text-xl text-orange-700 font-medium">Trascina o tocca l'icona <span class="bg-white px-2 rounded-lg border-2 font-black">TU 📍</span> e portala in <strong>CUCINA</strong>.</p>
                    </div>
                    <div class="relative bg-slate-100 rounded-[3rem] p-4 w-full h-[400px] shadow-inner border-8 border-slate-200 overflow-hidden">
                        <div class="absolute inset-0 grid grid-cols-2 grid-rows-2 gap-4 p-4">
                            <div class="bg-slate-200 rounded-3xl flex items-center justify-center text-slate-400 font-black uppercase">Bagno</div>
                            <div id="target-kitchen" ondrop="dropMap(event)" ondragover="allowDrop(event)" onclick="moveMap()"
                                 class="bg-orange-200/50 border-4 border-dashed border-orange-400 rounded-3xl flex items-center justify-center text-orange-600 font-black text-2xl uppercase cursor-pointer">
                                CUCINA
                            </div>
                            <div class="bg-slate-200 rounded-3xl flex items-center justify-center text-slate-400 font-black uppercase">Soggiorno</div>
                            <div class="bg-slate-200 rounded-3xl flex items-center justify-center text-slate-400 font-black uppercase">Camera</div>
                        </div>
                        <div id="user-avatar" draggable="true" ondragstart="drag(event)" data-value="tu" onclick="moveMap()"
                             class="absolute bottom-10 right-10 bg-white text-indigo-700 w-24 h-24 flex flex-col items-center justify-center rounded-full shadow-2xl cursor-move z-10 border-4 border-indigo-600 font-black">
                             <span class="text-3xl">📍</span> TU
                        </div>
                    </div>
                </div>
            `;
        }

        function dropMap(ev) {
            ev.preventDefault();
            if (ev.dataTransfer.getData("value") === 'tu') moveMap();
        }

        function moveMap() {
            document.getElementById('target-kitchen').innerHTML = "ECCELLENTE!";
            document.getElementById('target-kitchen').className = "bg-green-600 rounded-3xl flex items-center justify-center text-white font-black text-3xl animate-pulse";
            document.getElementById('user-avatar').style.display = 'none';
            playSound('success');
            setTimeout(() => { state.step = 'final'; render(); }, 1500);
        }

        function renderFinal(container) {
            playSound('victory'); // Suono speciale per la fine dell'app
            container.innerHTML = `
                <div class="text-center py-12 px-6 bg-white rounded-[4rem] shadow-2xl border-b-8 border-green-600 mt-6 max-w-2xl mx-auto">
                    <span class="text-8xl block mb-6">🥇</span>
                    <h2 class="text-4xl font-black text-green-700 mb-4 uppercase">Ottimo lavoro!</h2>
                    <p class="text-2xl text-slate-700 leading-relaxed font-medium mb-10">
                        Ti sei orientato perfettamente.<br>Hai completato tutti gli esercizi.
                    </p>
                    <button onclick="resetApp()" class="btn-large bg-indigo-600 border-indigo-800 text-white px-16 py-6 rounded-full text-2xl font-black shadow-xl uppercase">
                        Ricomincia
                    </button>
                </div>
            `;
        }

        function resetApp() {
            state.step = 'difficulty';
            state.answers = { weekday: null, day: null, month: null, year: null, season: null };
            render();
        }

        function generateOptions(correct, count, type) {
            let options = [correct.toUpperCase()];
            const m = ['GENNAIO', 'FEBBRAIO', 'MARZO', 'APRILE', 'MAGGIO', 'GIUGNO', 'LUGLIO', 'AGOSTO', 'SETTEMBRE', 'OTTOBRE', 'NOVEMBRE', 'DICEMBRE'];
            const w = ['LUNEDÌ', 'MARTEDÌ', 'MERCOLEDÌ', 'GIOVEDÌ', 'VENERDÌ', 'SABATO', 'DOMENICA'];
            
            while (options.length < count) {
                let random;
                if (type === 'weekday') {
                    random = w[Math.floor(Math.random() * w.length)];
                } else if (type === 'number') {
                    let val = Math.max(1, Math.min(31, parseInt(correct) + (Math.floor(Math.random() * 7) - 3)));
                    random = val.toString();
                } else if (type === 'month') {
                    random = m[Math.floor(Math.random() * 12)];
                } else if (type === 'year') {
                    random = (parseInt(correct) + (Math.floor(Math.random() * 5) - 2)).toString();
                }
                if (!options.includes(random)) options.push(random);
            }
            return options;
        }

        function shuffle(array) { 
            return array.sort(() => Math.random() - 0.5); 
        }

        window.onload = render;
    </script>
</body>
</html>
