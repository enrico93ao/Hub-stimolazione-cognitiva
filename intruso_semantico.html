    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            touch-action: manipulation;
            user-select: none;
            overflow-x: hidden;
        }

        .word-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .word-card:active {
            transform: scale(0.95);
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .correct {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #059669 !important;
            transform: scale(1.05);
            z-index: 10;
        }

        .wrong {
            background-color: #ef4444 !important;
            color: white !important;
            border-color: #dc2626 !important;
        }

        .progress-bar {
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) initAudio();
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start(); osc.stop(now + 0.3);
            } else {
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc1.type = 'sawtooth'; osc2.type = 'square';
                osc1.frequency.setValueAtTime(100, now);
                osc2.frequency.setValueAtTime(105, now);
                osc1.frequency.exponentialRampToValueAtTime(40, now + 0.4);
                osc2.frequency.exponentialRampToValueAtTime(45, now + 0.4);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0.05, now + 0.2);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                osc1.connect(gain); osc2.connect(gain);
                gain.connect(audioCtx.destination);
                osc1.start(); osc2.start();
                osc1.stop(now + 0.4); osc2.stop(now + 0.4);
            }
        }

        function setLevel(l) {
            gameState.level = l;
            document.getElementById('lvl-1-btn').className = l === 1 ? 'py-4 px-4 rounded-2xl border-2 border-indigo-600 bg-indigo-50 text-indigo-700 font-bold transition-all text-sm' : 'py-4 px-4 rounded-2xl border-2 border-slate-100 bg-slate-50 text-slate-500 font-bold hover:border-indigo-200 transition-all text-sm';
            document.getElementById('lvl-2-btn').className = l === 2 ? 'py-4 px-4 rounded-2xl border-2 border-indigo-600 bg-indigo-50 text-indigo-700 font-bold transition-all text-sm' : 'py-4 px-4 rounded-2xl border-2 border-slate-100 bg-slate-50 text-slate-500 font-bold hover:border-indigo-200 transition-all text-sm';
        }

        function setRounds(r) {
            gameState.rounds = r;
            [10, 20, 50].forEach(n => {
                document.getElementById(`rnd-${n}-btn`).className = n === r ? 'py-3 rounded-xl border-2 border-indigo-600 bg-indigo-50 text-indigo-700 font-bold transition-all' : 'py-3 rounded-xl border-2 border-slate-100 bg-slate-50 text-slate-500 font-bold transition-all';
            });
        }

        function startGame() {
            initAudio();
            gameState.currentIndex = 0;
            gameState.correct = 0;
            gameState.wrong = 0;
            gameState.errors = [];
            gameState.history = []; // Reset history
            
            const pool = [...dataset[`level${gameState.level}`]];
            gameState.sessionPool = shuffle(pool).slice(0, gameState.rounds);
            
            // Re-fill if pool is smaller than requested rounds
            while(gameState.sessionPool.length < gameState.rounds) {
                gameState.sessionPool.push(...shuffle(pool).slice(0, gameState.rounds - gameState.sessionPool.length));
            }

            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('total-rounds-display').innerText = gameState.rounds;
            renderRound();
        }

        function renderRound() {
            gameState.isTransitioning = false;
            const data = gameState.sessionPool[gameState.currentIndex];
            const words = shuffle([...data.items]);
            
            document.getElementById('current-round').innerText = gameState.currentIndex + 1;
            document.getElementById('progress').style.width = `${(gameState.currentIndex / gameState.rounds) * 100}%`;
            
            const grid = document.getElementById('words-grid');
            grid.innerHTML = '';
            
            words.forEach((w, i) => {
                const b = document.createElement('button');
                b.className = 'word-card h-32 md:h-44 bg-white border-2 border-slate-100 rounded-3xl text-xl md:text-2xl font-bold text-slate-700 shadow-sm hover:border-indigo-200 fade-in flex items-center justify-center p-4 text-center';
                b.style.animationDelay = `${i * 0.05}s`;
                b.innerText = w;
                b.onclick = () => checkAnswer(w, data.intruder, b, data);
                grid.appendChild(b);
            });
        }

        function checkAnswer(selected, correct, element, data) {
            if (gameState.isTransitioning) return;
            gameState.isTransitioning = true;

            const isCorrect = selected === correct;
            const cards = document.querySelectorAll('.word-card');
            
            gameState.history.push({
                round: gameState.currentIndex + 1,
                selected: selected,
                correct: correct,
                isCorrect: isCorrect,
                reason: data.reason
            });

            if (isCorrect) {
                playSound('correct');
                gameState.correct++;
                element.classList.add('correct');
            } else {
                playSound('wrong');
                gameState.wrong++;
                element.classList.add('wrong', 'shake');
                gameState.errors.push({
                    round: gameState.currentIndex + 1,
                    selected: selected,
                    correct: correct,
                    options: data.items,
                    reason: data.reason
                });
                
                cards.forEach(c => {
                    if (c.innerText === correct) c.classList.add('correct');
                });
            }

            setTimeout(() => {
                gameState.currentIndex++;
                if (gameState.currentIndex < gameState.rounds) {
                    renderRound();
                } else {
                    showResults();
                }
            }, 1200);
        }

        function showResults() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-correct').innerText = gameState.correct;
            document.getElementById('final-wrong').innerText = gameState.wrong;
            
            const accuracy = Math.round((gameState.correct / gameState.rounds) * 100);
            document.getElementById('session-percentage').innerText = `${accuracy}%`;

            let comment = "";
            if (accuracy === 100) comment = "Incredibile! Padronanza assoluta.";
            else if (accuracy >= 80) comment = "Ottimo lavoro, ottima proprietà di linguaggio.";
            else if (accuracy >= 50) comment = "Buona prestazione, continua così.";
            else comment = "L'esercizio ti aiuterà a migliorare i collegamenti logici.";
            
            document.getElementById('accuracy-comment').innerText = comment;
            
            const timeline = document.getElementById('session-timeline');
            timeline.innerHTML = '';
            
            gameState.history.forEach(item => {
                const row = document.createElement('div');
                row.className = `flex items-center gap-3 p-3 rounded-xl border ${item.isCorrect ? 'bg-emerald-50/50 border-emerald-100' : 'bg-rose-50/50 border-rose-100'}`;
                
                row.innerHTML = `
                    <div class="w-6 h-6 flex-shrink-0 flex items-center justify-center rounded-full ${item.isCorrect ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'} text-[10px] font-bold">
                        ${item.round}
                    </div>
                    <div class="flex-1 text-left">
                        <p class="text-xs font-bold ${item.isCorrect ? 'text-emerald-700' : 'text-rose-700'}">${item.selected}</p>
                        ${!item.isCorrect ? `<p class="text-[10px] text-slate-400">Corretta: <span class="text-slate-600">${item.correct}</span></p>` : ''}
                    </div>
                    <div class="text-[10px] ${item.isCorrect ? 'text-emerald-500' : 'text-rose-500'} font-black uppercase">
                        ${item.isCorrect ? 'OK' : 'ERR'}
                    </div>
                `;
                timeline.appendChild(row);
            });

            if (gameState.errors.length > 0) {
                document.getElementById('review-section').classList.remove('hidden');
                populateReview();
            } else {
                document.getElementById('review-section').classList.add('hidden');
            }
        }

        function populateReview() {
            const list = document.getElementById('error-list');
            list.innerHTML = '';
            gameState.errors.forEach(err => {
                const div = document.createElement('div');
                div.className = 'bg-slate-50 p-5 rounded-2xl border border-slate-100';
                
                const chips = err.options.map(opt => {
                    const isCorrect = opt === err.correct;
                    const isSelected = opt === err.selected;
                    let cls = "bg-white text-slate-400 border-slate-200";
                    if (isCorrect) cls = "bg-emerald-100 text-emerald-700 border-emerald-300";
                    if (isSelected && !isCorrect) cls = "bg-rose-100 text-rose-700 border-rose-300";
                    return `<span class="px-2 py-1 border rounded-lg text-[10px] font-bold uppercase ${cls}">${opt}</span>`;
                }).join(' ');

                div.innerHTML = `
                    <div class="flex flex-wrap gap-2 mb-3">${chips}</div>
                    <p class="text-sm text-slate-600 leading-relaxed">
                        <strong class="text-indigo-600">Analisi:</strong> ${err.reason}
                    </p>
                `;
                list.appendChild(div);
            });
        }

        function toggleReview() {
            document.getElementById('review-modal').classList.toggle('hidden');
        }

        function quitGame() { document.getElementById('quit-modal').classList.remove('hidden'); }
        function closeQuitModal() { document.getElementById('quit-modal').classList.add('hidden'); }
        function confirmQuit() { closeQuitModal(); resetToMenu(); }
        
        function resetToMenu() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        }

        function shuffle(array) {
            let m = array.length, t, i;
            while (m) {
                i = Math.floor(Math.random() * m--);
                t = array[m]; array[m] = array[i]; array[i] = t;
            }
            return array;
        }
    </script>
</body>
</html>
