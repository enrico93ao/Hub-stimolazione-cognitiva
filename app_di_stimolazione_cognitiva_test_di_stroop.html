<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Stimolazione Cognitiva - Attenzione e Velocità</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #f1f5f9;
            touch-action: manipulation;
            overflow: hidden;
        }
        .color-card {
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(3rem, 15vw, 5.5rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.2s ease;
        }
        .btn-game {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .btn-game:active {
            transform: scale(0.92);
            filter: brightness(0.9);
        }
        @keyframes pulse-success {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .success-anim {
            animation: pulse-success 0.2s ease-out;
        }
        .stat-card {
            background: white;
            padding: 1rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div id="main-menu" class="flex-grow flex flex-col items-center justify-center p-6 text-center animate-in fade-in duration-500">
        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-800 mb-4 tracking-tight">Focus Trainer</h1>
        <p class="text-lg text-slate-500 mb-10 max-w-md leading-relaxed">
            Allena la tua <span class="text-indigo-600 font-bold">attenzione selettiva</span>: clicca sul colore dell'inchiostro ignorando il testo.
        </p>

        <div class="w-full max-w-sm space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 text-left ml-1">Scegli Difficoltà</label>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="setDifficulty(1)" id="btn-diff-1" class="py-4 px-4 rounded-2xl border-2 border-indigo-500 bg-indigo-50 text-indigo-700 font-bold shadow-sm transition-all">Livello 1<br><span class="text-[10px] font-normal uppercase opacity-70">Semplice</span></button>
                    <button onclick="setDifficulty(2)" id="btn-diff-2" class="py-4 px-4 rounded-2xl border-2 border-slate-200 bg-white text-slate-600 font-bold shadow-sm hover:border-slate-300 transition-all">Livello 2<br><span class="text-[10px] font-normal uppercase opacity-70">Stroop</span></button>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 text-left ml-1">Tempo Sessione</label>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="setDuration(60)" id="btn-time-60" class="py-3 rounded-xl border-2 border-indigo-500 bg-indigo-50 text-indigo-700 font-bold shadow-sm transition-all">1m</button>
                    <button onclick="setDuration(180)" id="btn-time-180" class="py-3 rounded-xl border-2 border-slate-200 bg-white text-slate-600 font-bold shadow-sm transition-all">3m</button>
                    <button onclick="setDuration(300)" id="btn-time-300" class="py-3 rounded-xl border-2 border-slate-200 bg-white text-slate-600 font-bold shadow-sm transition-all">5m</button>
                </div>
            </div>

            <button onclick="startGame()" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white text-xl font-black rounded-2xl shadow-xl transform transition hover:-translate-y-1 active:translate-y-0">
                AVVIA TEST
            </button>
        </div>
    </div>

    <div id="game-screen" class="hidden flex-grow flex flex-col p-4 md:p-8 max-w-3xl mx-auto w-full">
        <div class="flex justify-between items-center mb-8">
            <div class="bg-white px-5 py-2 rounded-2xl shadow-sm border border-slate-200">
                <span class="text-slate-400 text-xs font-bold uppercase block">Timer</span>
                <span class="text-slate-700 font-mono text-xl font-bold" id="timer-display">01:00</span>
            </div>
            <div class="bg-white px-5 py-2 rounded-2xl shadow-sm border border-slate-200 text-right">
                <span class="text-slate-400 text-xs font-bold uppercase block">Punteggio</span>
                <span class="text-indigo-600 text-xl font-bold" id="score-display">0</span>
            </div>
        </div>

        <div class="flex-grow flex items-center justify-center bg-white rounded-[2.5rem] shadow-sm border border-slate-200 mb-10 relative overflow-hidden">
            <div id="stimulus" class="color-card">PRONTI?</div>
        </div>

        <div class="grid grid-cols-2 gap-4 md:gap-6 mb-4">
            <button onclick="handleResponse('ROSSO')" class="btn-game py-8 bg-white border-b-8 border-red-500 text-red-600 rounded-3xl text-2xl font-black shadow-lg">ROSSO</button>
            <button onclick="handleResponse('BLU')" class="btn-game py-8 bg-white border-b-8 border-blue-500 text-blue-600 rounded-3xl text-2xl font-black shadow-lg">BLU</button>
            <button onclick="handleResponse('VERDE')" class="btn-game py-8 bg-white border-b-8 border-green-500 text-green-600 rounded-3xl text-2xl font-black shadow-lg">VERDE</button>
            <button onclick="handleResponse('GIALLO')" class="btn-game py-8 bg-white border-b-8 border-yellow-400 text-yellow-600 rounded-3xl text-2xl font-black shadow-lg">GIALLO</button>
        </div>
    </div>

    <div id="results-screen" class="hidden flex-grow flex flex-col items-center justify-center p-4 md:p-6 animate-in zoom-in duration-300">
        <div class="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 w-full max-w-lg text-center">
            <div id="rating-stars" class="text-3xl mb-2">⭐⭐⭐⭐⭐</div>
            <h2 class="text-3xl font-extrabold text-slate-800 mb-1">Sessione Completata</h2>
            <p id="performance-feedback" class="text-slate-500 mb-8 italic">Ottima capacità di concentrazione!</p>
            
            <!-- Info Sessione -->
            <div class="flex justify-center gap-2 mb-6">
                <span id="summary-level" class="bg-indigo-100 text-indigo-700 text-[10px] font-bold uppercase px-3 py-1 rounded-full">LIVELLO 2</span>
                <span id="summary-duration" class="bg-slate-100 text-slate-700 text-[10px] font-bold uppercase px-3 py-1 rounded-full">1 MINUTO</span>
            </div>

            <!-- Griglia Statistiche -->
            <div class="grid grid-cols-2 gap-3 md:gap-4 mb-10">
                <div class="stat-card">
                    <span class="text-slate-400 text-[10px] font-bold uppercase mb-1">Corrette</span>
                    <span id="final-score" class="text-2xl font-black text-indigo-600">0</span>
                </div>
                <div class="stat-card">
                    <span class="text-slate-400 text-[10px] font-bold uppercase mb-1">Errori</span>
                    <span id="final-errors" class="text-2xl font-black text-red-500">0</span>
                </div>
                <div class="stat-card">
                    <span class="text-slate-400 text-[10px] font-bold uppercase mb-1">Reazione Media</span>
                    <span id="final-avg-time" class="text-2xl font-black text-blue-600">0.0s</span>
                </div>
                <div class="stat-card">
                    <span class="text-slate-400 text-[10px] font-bold uppercase mb-1">Accuratezza</span>
                    <span id="final-accuracy" class="text-2xl font-black text-slate-800">0%</span>
                </div>
            </div>

            <div class="space-y-3">
                <button onclick="resetApp()" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg transition-all">
                    NUOVA SESSIONE
                </button>
                <button onclick="window.location.reload()" class="w-full py-3 bg-white text-slate-400 text-sm font-semibold rounded-2xl hover:text-slate-600 transition-all">
                    Torna al Menu Principale
                </button>
            </div>
        </div>
    </div>

    <script>
        const colors = [
            { name: 'ROSSO', hex: '#ef4444' },
            { name: 'BLU', hex: '#3b82f6' },
            { name: 'VERDE', hex: '#22c55e' },
            { name: 'GIALLO', hex: '#eab308' }
        ];

        let difficulty = 1;
        let sessionDuration = 60;
        let timeLeft = 60;
        let timerId = null;
        let score = 0;
        let totalAttempts = 0;
        let responseTimes = [];
        let stimulusStartTime = 0;
        let currentColorIndex = 0;
        let isProcessing = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'correct') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.15);
            } else {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(120, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.2);
            }
        }

        const mainMenu = document.getElementById('main-menu');
        const gameScreen = document.getElementById('game-screen');
        const resultsScreen = document.getElementById('results-screen');
        const stimulusEl = document.getElementById('stimulus');
        const scoreDisplay = document.getElementById('score-display');
        const timerDisplay = document.getElementById('timer-display');

        function setDifficulty(lvl) {
            difficulty = lvl;
            document.getElementById('btn-diff-1').className = lvl === 1 
                ? 'py-4 px-4 rounded-2xl border-2 border-indigo-500 bg-indigo-50 text-indigo-700 font-bold shadow-sm transition-all' 
                : 'py-4 px-4 rounded-2xl border-2 border-slate-200 bg-white text-slate-600 font-bold shadow-sm hover:border-slate-300 transition-all';
            document.getElementById('btn-diff-2').className = lvl === 2 
                ? 'py-4 px-4 rounded-2xl border-2 border-indigo-500 bg-indigo-50 text-indigo-700 font-bold shadow-sm transition-all' 
                : 'py-4 px-4 rounded-2xl border-2 border-slate-200 bg-white text-slate-600 font-bold shadow-sm hover:border-slate-300 transition-all';
        }

        function setDuration(seconds) {
            sessionDuration = seconds;
            [60, 180, 300].forEach(s => {
                const btn = document.getElementById(`btn-time-${s}`);
                btn.className = seconds === s 
                    ? 'py-3 rounded-xl border-2 border-indigo-500 bg-indigo-50 text-indigo-700 font-bold shadow-sm transition-all' 
                    : 'py-3 rounded-xl border-2 border-slate-200 bg-white text-slate-600 font-bold shadow-sm hover:border-slate-300 transition-all';
            });
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            mainMenu.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            resultsScreen.classList.add('hidden');
            
            score = 0; totalAttempts = 0; responseTimes = [];
            timeLeft = sessionDuration;
            scoreDisplay.innerText = score;
            isProcessing = false;
            
            updateTimerDisplay();
            nextStimulus();
            
            timerId = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function nextStimulus() {
            const inkColorObj = colors[Math.floor(Math.random() * colors.length)];
            let wordIndex;

            if (difficulty === 1) {
                wordIndex = colors.findIndex(c => c.name === inkColorObj.name);
            } else {
                let otherIndices = colors.map((_, i) => i).filter(i => colors[i].name !== inkColorObj.name);
                wordIndex = otherIndices[Math.floor(Math.random() * otherIndices.length)];
            }

            stimulusEl.innerText = colors[wordIndex].name;
            stimulusEl.style.color = inkColorObj.hex;
            currentColorIndex = colors.findIndex(c => c.name === inkColorObj.name);
            stimulusStartTime = Date.now();
            isProcessing = false;
        }

        function handleResponse(selectedColorName) {
            if (isProcessing) return;
            isProcessing = true;

            const correctColorName = colors[currentColorIndex].name;
            const rt = (Date.now() - stimulusStartTime) / 1000;
            
            totalAttempts++;
            if (selectedColorName === correctColorName) {
                score++;
                scoreDisplay.innerText = score;
                responseTimes.push(rt);
                playSound('correct');
                stimulusEl.classList.add('success-anim');
                setTimeout(() => stimulusEl.classList.remove('success-anim'), 200);
            } else {
                playSound('wrong');
                stimulusEl.animate([
                    { transform: 'translateX(-10px)' }, { transform: 'translateX(10px)' }, { transform: 'translateX(0)' }
                ], { duration: 200 });
            }
            setTimeout(nextStimulus, 120);
        }

        function endGame() {
            clearInterval(timerId);
            gameScreen.classList.add('hidden');
            resultsScreen.classList.remove('hidden');

            const errors = totalAttempts - score;
            const validTimes = responseTimes;
            const avgTime = validTimes.length > 0 
                ? (validTimes.reduce((a, b) => a + b, 0) / validTimes.length).toFixed(2) 
                : "0.00";
            const accuracy = totalAttempts > 0 ? Math.round((score / totalAttempts) * 100) : 0;

            // Popolamento Schermata Riepilogo
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-errors').innerText = errors;
            document.getElementById('final-avg-time').innerText = `${avgTime}s`;
            document.getElementById('final-accuracy').innerText = `${accuracy}%`;
            document.getElementById('summary-level').innerText = `LIVELLO ${difficulty}`;
            document.getElementById('summary-duration').innerText = `${sessionDuration / 60} MINUTO/I`;

            // Calcolo Rating e Feedback
            let stars = "⭐⭐";
            let feedback = "Continua ad allenarti per migliorare!";
            
            if (accuracy >= 95) {
                stars = "⭐⭐⭐⭐⭐";
                feedback = avgTime < 1.0 ? "Prestazione eccellente! Sei un fulmine." : "Ottima precisione, prova a velocizzarti!";
            } else if (accuracy >= 85) {
                stars = "⭐⭐⭐⭐";
                feedback = "Buon equilibrio tra velocità e precisione.";
            } else if (accuracy >= 70) {
                stars = "⭐⭐⭐";
                feedback = "Niente male, prova a rallentare per non sbagliare.";
            }

            document.getElementById('rating-stars').innerText = stars;
            document.getElementById('performance-feedback').innerText = feedback;
        }

        function resetApp() {
            resultsScreen.classList.add('hidden');
            startGame();
        }
    </script>
</body>
</html>
