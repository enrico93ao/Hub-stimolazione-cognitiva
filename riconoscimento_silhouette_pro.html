<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riconoscimento Silhouette Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            touch-action: manipulation;
            user-select: none;
            background-color: #f3f4f6; /* Grigio chiaro neutro */
        }

        .silhouette-box {
            filter: brightness(0);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .icon-wrapper {
            width: 70%;
            height: 70%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .option-card {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .option-card:active {
            transform: scale(0.92);
        }

        .progress-bar {
            transition: width 0.4s ease-out;
        }

        /* Animazioni di Feedback */
        @keyframes success-pulse {
            0% { transform: scale(1); border-color: transparent; }
            50% { transform: scale(1.05); border-color: #10b981; background-color: #ecfdf5; }
            100% { transform: scale(1); border-color: transparent; }
        }
        .animate-success { animation: success-pulse 0.5s ease-out; }

        @keyframes error-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .animate-error { animation: error-shake 0.4s ease-in-out; }

        /* Stato pulsanti menu */
        .btn-active {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
            color: #1d4ed8 !important;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800">

    <div id="start-menu" class="fixed inset-0 z-50 bg-gray-100 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-10">
            <h1 class="text-4xl font-extrabold text-gray-900 mb-2 text-center italic">Silhouette</h1>
            <p class="text-gray-500 text-center mb-10">Allena il riconoscimento visivo</p>
            
            <div class="space-y-8">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Difficoltà (N. Opzioni)</label>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="setDifficulty('easy')" id="btn-easy" class="diff-btn py-4 rounded-2xl border-2 border-gray-100 font-bold hover:bg-gray-50 transition-all text-sm">2 Oggetti</button>
                        <button onclick="setDifficulty('medium')" id="btn-medium" class="diff-btn py-4 rounded-2xl border-2 border-gray-100 font-bold hover:bg-gray-50 transition-all text-sm">3 Oggetti</button>
                        <button onclick="setDifficulty('hard')" id="btn-hard" class="diff-btn py-4 rounded-2xl border-2 border-gray-100 font-bold hover:bg-gray-50 transition-all text-sm">4 Oggetti</button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Lunghezza Sessione</label>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="setDuration(5)" id="btn-dur-5" class="dur-btn py-4 rounded-2xl border-2 border-gray-100 font-bold hover:bg-gray-50 transition-all text-sm">5 Prove</button>
                        <button onclick="setDuration(10)" id="btn-dur-10" class="dur-btn py-4 rounded-2xl border-2 border-gray-100 font-bold hover:bg-gray-50 transition-all text-sm">10 Prove</button>
                        <button onclick="setDuration(20)" id="btn-dur-20" class="dur-btn py-4 rounded-2xl border-2 border-gray-100 font-bold hover:bg-gray-50 transition-all text-sm">20 Prove</button>
                    </div>
                </div>

                <button onclick="startGame()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-xl shadow-blue-100 transition-all transform active:scale-95 mt-6 text-lg">
                    Comincia Ora
                </button>
            </div>
        </div>
    </div>

    <header class="bg-white border-b px-6 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center space-x-6">
            <button onclick="resetToMenu()" class="p-3 hover:bg-red-50 rounded-2xl text-gray-400 hover:text-red-500 transition-colors" title="Esci">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            </button>
            <div class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl font-bold text-sm tracking-tighter">
                PROVA <span id="ui-level" class="text-blue-600">1</span>
            </div>
        </div>
        
        <div class="flex-grow max-w-md mx-8">
            <div class="h-3 w-full bg-gray-100 rounded-full overflow-hidden">
                <div id="session-progress" class="h-full bg-blue-500 progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <div class="flex items-center space-x-2 bg-green-50 px-4 py-2 rounded-xl">
            <span class="text-green-600 font-black text-lg" id="ui-correct">0</span>
            <span class="text-green-200">/</span>
            <span class="text-green-800 font-bold" id="ui-total">0</span>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6 relative">
        <div id="game-arena" class="w-full max-w-6xl flex flex-col md:flex-row items-center justify-around gap-16">
            
            <!-- Target Silhouette -->
            <div class="flex flex-col items-center">
                <div id="target-container" class="bg-white w-64 h-64 md:w-96 md:h-96 rounded-[3.5rem] shadow-xl flex items-center justify-center p-12 border-8 border-white transition-all duration-300 overflow-hidden">
                    <!-- SVG via JS -->
                </div>
                <p class="mt-8 text-gray-400 font-bold uppercase tracking-[0.3em] text-xs">Identifica l'ombra</p>
            </div>

            <!-- Vertical Divider -->
            <div class="hidden md:block h-64 w-px bg-gray-200"></div>

            <!-- Options Grid -->
            <div id="options-grid" class="grid gap-8">
                <!-- Buttons via JS -->
            </div>
        </div>

        <div id="results-screen" class="hidden absolute inset-0 bg-gray-50 z-40 flex flex-col items-center justify-center p-6 text-center">
            <div class="bg-white p-12 rounded-[3rem] shadow-2xl max-w-md w-full">
                <div class="w-20 h-20 bg-blue-600 text-white rounded-3xl flex items-center justify-center mx-auto mb-8 transform rotate-12 shadow-lg shadow-blue-200">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-3xl font-black text-gray-900 mb-2">Completato!</h2>
                <p class="text-gray-400 mb-10 font-medium">Ottimo allenamento visivo.</p>

                <div class="grid grid-cols-2 gap-4 mb-10">
                    <div class="bg-gray-50 p-6 rounded-3xl border border-gray-100">
                        <div class="text-3xl font-black text-blue-600" id="stat-accuracy">0%</div>
                        <div class="text-[10px] text-gray-400 uppercase font-bold mt-1 tracking-widest">Precisione</div>
                    </div>
                    <div class="bg-gray-50 p-6 rounded-3xl border border-gray-100">
                        <div class="text-3xl font-black text-purple-600" id="stat-speed">0s</div>
                        <div class="text-[10px] text-gray-400 uppercase font-bold mt-1 tracking-widest">Tempo Medio</div>
                    </div>
                </div>

                <button onclick="location.reload()" class="w-full bg-gray-900 text-white font-bold py-5 rounded-2xl hover:bg-black transition-all active:scale-95 shadow-xl">
                    Nuova Sessione
                </button>
            </div>
        </div>
    </main>

    <script>
        const ASSETS = [
            { id: 'lamp', color: '#fbbf24', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 7h1a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2h-2m-3 0h-2a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1"/><path d="M9.17 14.83a4 4 0 1 0 5.66 0"/><path d="M12 2v5"/><path d="M12 11v2"/><path d="m3 22 2-2"/><path d="m21 22-2-2"/><path d="M3 13h2"/><path d="M19 13h2"/></svg>' },
            { id: 'chair', color: '#92400e', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20v-5h10v5"/><path d="M7 15V4a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v11"/><path d="M5 15h14"/><path d="M8 12h8"/></svg>' },
            { id: 'apple', color: '#ef4444', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.94c1.88 0 3.05-1.4 5.41-1.4 2.12 0 3.89 1.55 4.59 1.55 1.14 0 2-1.34 2-3.13 0-5.18-2.61-8.5-4.81-8.5-1.28 0-2.3.69-3.26.69-.95 0-2.28-.73-3.6-.73C9.42 9.42 6 12.83 6 18c0 1.77.86 3.13 2 3.13.7 0 2.47-1.55 4.59-1.55 2.37 0 3.53 1.41 5.41 1.41Z"/><path d="M12 13V2"/></svg>' },
            { id: 'clock', color: '#3b82f6', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' },
            { id: 'umbrella', color: '#8b5cf6', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12a10 10 0 0 0-20 0Z"/><path d="M12 12v8a2 2 0 0 0 4 0"/></svg>' },
            { id: 'car', color: '#475569', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>' },
            { id: 'headphones', color: '#ec4899', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3Z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3Z"/></svg>' },
            { id: 'kettle', color: '#14b8a6', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 14h.01"/><path d="M10 14h.01"/><path d="M14 14h.01"/><path d="M18 16V8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a4 4 0 0 0 4 4h8a4 4 0 0 0 4-4Z"/><path d="m18 8 4-4"/><path d="M12 2v4"/></svg>' },
            { id: 'tree', color: '#16a34a', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L8 8h8zM12 7l-5 7h10zM12 12l-6 8h12zM12 20v2"/></svg>' },
            { id: 'gift', color: '#db2777', svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4"/><path d="M12 8v13M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7M7.5 8a2.5 2.5 0 0 1 0-5C11 3 12 8 12 8s1-5 4.5-5a2.5 2.5 0 0 1 0 5"/></svg>' }
        ];

        let state = {
            difficulty: 'easy',
            durationValue: 10,
            currentLevel: 0,
            correct: 0,
            errors: 0,
            times: [],
            levelStartTime: 0,
            isActive: false,
            assetPool: [],
            targetItem: null
        };

        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playTone(freq, type, duration) {
            if (!audioCtx) audioCtx = new AudioCtx();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function setDifficulty(d) {
            state.difficulty = d;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('btn-active'));
            document.getElementById(`btn-${d}`).classList.add('btn-active');
        }

        function setDuration(v) {
            state.durationValue = v;
            document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('btn-active'));
            document.getElementById(`btn-dur-${v}`).classList.add('btn-active');
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startGame() {
            state.assetPool = shuffle([...ASSETS]);
            state.correct = 0;
            state.errors = 0;
            state.times = [];
            state.currentLevel = 1;
            state.isActive = true;
            document.getElementById('start-menu').classList.add('hidden');
            nextLevel();
        }

        function resetToMenu() {
            state.isActive = false;
            document.getElementById('start-menu').classList.remove('hidden');
            document.getElementById('results-screen').classList.add('hidden');
        }

        function nextLevel() {
            if (state.currentLevel > state.durationValue) {
                endGame();
                return;
            }

            // Se il pool è vuoto, lo ricarichiamo e rimescoliamo
            if (state.assetPool.length === 0) {
                state.assetPool = shuffle([...ASSETS]);
            }

            // Estraiamo il target (garantisce che non sia lo stesso dell'ultimo a meno di sfortuna nel reshuffle)
            let nextTarget = state.assetPool.pop();
            if (state.targetItem && nextTarget.id === state.targetItem.id && state.assetPool.length > 0) {
                const swap = state.assetPool.pop();
                state.assetPool.push(nextTarget);
                nextTarget = swap;
            }
            state.targetItem = nextTarget;

            state.levelStartTime = Date.now();
            document.getElementById('ui-level').textContent = state.currentLevel;
            document.getElementById('ui-correct').textContent = state.correct;
            document.getElementById('ui-total').textContent = state.durationValue;
            document.getElementById('session-progress').style.width = `${((state.currentLevel - 1) / state.durationValue) * 100}%`;

            // Rendering Silhouette centrata
            const targetCont = document.getElementById('target-container');
            targetCont.innerHTML = `<div class="silhouette-box"><div class="icon-wrapper">${state.targetItem.svg}</div></div>`;
            targetCont.style.borderColor = 'white';

            // Opzioni
            let optionsCount = state.difficulty === 'easy' ? 2 : (state.difficulty === 'medium' ? 3 : 4);
            let options = [state.targetItem];
            let distractors = ASSETS.filter(a => a.id !== state.targetItem.id);
            shuffle(distractors);
            
            while(options.length < optionsCount) {
                options.push(distractors.pop());
            }
            shuffle(options);

            const grid = document.getElementById('options-grid');
            grid.className = `grid gap-6 ${optionsCount > 2 ? 'grid-cols-2' : 'grid-cols-1'}`;
            grid.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-card bg-white p-4 rounded-[2.5rem] shadow-lg border-4 border-transparent w-40 h-40 md:w-56 md:h-56 overflow-hidden flex items-center justify-center";
                btn.innerHTML = `<div class="icon-wrapper" style="color: ${opt.color}">${opt.svg}</div>`;
                btn.onclick = () => handleChoice(opt.id, btn);
                grid.appendChild(btn);
            });
        }

        function handleChoice(id, element) {
            if (!state.isActive) return;

            if (id === state.targetItem.id) {
                playTone(523, 'sine', 0.1); 
                setTimeout(() => playTone(659, 'sine', 0.2), 100);
                
                state.isActive = false;
                state.correct++;
                state.times.push(Date.now() - state.levelStartTime);
                
                element.classList.add('animate-success');
                document.getElementById('target-container').style.borderColor = '#10b981';

                setTimeout(() => {
                    state.isActive = true;
                    state.currentLevel++;
                    nextLevel();
                }, 800);
            } else {
                playTone(180, 'sawtooth', 0.3);
                state.errors++;
                element.classList.add('animate-error');
                setTimeout(() => element.classList.remove('animate-error'), 400);
            }
        }

        function endGame() {
            state.isActive = false;
            document.getElementById('results-screen').classList.remove('hidden');
            
            const total = state.correct + state.errors;
            const accuracy = total > 0 ? Math.round((state.correct / total) * 100) : 0;
            const avgTime = state.times.length > 0 ? (state.times.reduce((a,b) => a+b, 0) / state.times.length / 1000).toFixed(1) : 0;

            document.getElementById('stat-accuracy').textContent = `${accuracy}%`;
            document.getElementById('stat-speed').textContent = `${avgTime}s`;
        }

        window.onload = () => {
            setDifficulty('easy');
            setDuration(10);
        };
    </script>
</body>
</html>
