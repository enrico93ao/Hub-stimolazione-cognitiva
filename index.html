        let currentActiveExerciseName = "";
        let hasSavedViaPostMessage = false;

        // INIZIALIZZAZIONE APPLICAZIONE
        window.addEventListener('DOMContentLoaded', () => {
            loadPatientsList();
            renderExercisesGrid('all');
            calculateCounters();
            checkActiveSessionState();

            // Ascolto eventi postMessage provenienti dagli iFrame interni (per salvataggi complessi)
            window.addEventListener('message', function(event) {
                var pId = localStorage.getItem('neurocenter_active_patient_id');
                var sId = localStorage.getItem('neurocenter_active_session_id');
                if(!pId || !sId || pId === 'FREE') return;

                if (event.data && event.data.type === 'NEURO_SESSION_DATA') {
                    var cleanKey = currentActiveExerciseName.replace(/ /g, '_');
                    database.ref('pazienti/' + pId + '/sessioni/' + sId + '/esercizi/' + cleanKey).set({
                        summary: event.data.summary || "Completato",
                        score: event.data.score || null,
                        accuracy: event.data.accuracy || null,
                        timestamp: Date.now()
                    }).then(() => {
                        hasSavedViaPostMessage = true;
                    }).catch((error) => {
                        console.error("Errore salvataggio via postMessage:", error);
                    });
                }
            });
        });

        // CALCOLO CONTATORI LATERALI
        function calculateCounters() {
            document.getElementById('count-all').innerText = exercises.length;
            ['memoria', 'attenzione', 'funzioni-esecutive', 'linguaggio', 'logica'].forEach(cat => {
                const count = exercises.filter(e => e.category === cat).length;
                const badge = document.getElementById('count-' + cat);
                if(badge) badge.innerText = count;
            });
        }

        // CONTROLlo STATO SESSIONE
        function checkActiveSessionState() {
            var activePatientId = localStorage.getItem('neurocenter_active_patient_id');
            var activePatientName = localStorage.getItem('neurocenter_active_patient_name');
            if (activePatientId) {
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('active-patient-badge').innerHTML = `<i class="fa-solid fa-user-check text-indigo-400 mr-1.5"></i> Profilo in uso: <strong class="text-white">${activePatientName}</strong>`;
            } else {
                document.getElementById('setup-screen').classList.remove('hidden');
            }
        }

        // CARICAMENTO LISTA PAZIENTI DA FIREBASE
        function loadPatientsList() {
            const container = document.getElementById('patients-list');

            if (!container) {
                console.error("Elemento #patients-list non trovato.");
                return;
            }

            if (!firebase.apps.length || !database) {
                container.innerHTML = '<div class="text-rose-500 text-sm italic p-4 text-center">Firebase non inizializzato. Impossibile caricare i pazienti.</div>';
                console.error("Firebase/database non inizializzato.");
                return;
            }

            container.innerHTML = '<div class="text-slate-500 text-sm italic p-4 text-center"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Caricamento profili in corso...</div>';

            database.ref('pazienti').once('value')
                .then((snapshot) => {
                    container.innerHTML = '';
                    const data = snapshot.val();

                    console.log("Pazienti letti da Firebase:", data);

                    if (!data) {
                        container.innerHTML = '<div class="text-slate-500 text-sm italic p-4 text-center">Nessun paziente registrato nel database cloud.</div>';
                        return;
                    }

                    const pazienti = Object.entries(data).sort((a, b) => {
                        const pa = a[1] || {};
                        const pb = b[1] || {};
                        return (pb.dataCreazione || 0) - (pa.dataCreazione || 0);
                    });

                    pazienti.forEach(([id, p]) => {
                        const nome = p.nome || '';
                        const cognome = p.cognome || '';
                        const note = p.note || 'Nessuna nota aggiuntiva';

                        const div = document.createElement('div');
                        div.className = "flex items-center justify-between p-3.5 bg-slate-950/60 hover:bg-indigo-950/40 border border-slate-800 hover:border-indigo-500/40 rounded-xl cursor-pointer transition group";
                        div.onclick = () => selectPatient(id, `${nome} ${cognome}`.trim());

                        div.innerHTML = `
                            <div class="flex items-center gap-3">
                                <div class="h-8 w-8 bg-slate-800 group-hover:bg-indigo-600 rounded-lg flex items-center justify-center text-xs font-bold text-slate-300 group-hover:text-white transition">
                                    ${(nome.charAt(0) || '?').toUpperCase()}${(cognome.charAt(0) || '').toUpperCase()}
                                </div>
                                <div>
                                    <h4 class="text-sm font-bold text-slate-200 group-hover:text-white transition">${nome} ${cognome}</h4>
                                    <p class="text-xs text-slate-500">${note}</p>
                                </div>
                            </div>
                            <i class="fa-solid fa-chevron-right text-slate-600 group-hover:text-indigo-400 text-xs transition"></i>
                        `;

                        container.appendChild(div);
                    });
                })
                .catch((error) => {
                    console.error("Errore lettura pazienti Firebase:", error);
                    container.innerHTML = `
                        <div class="text-rose-500 text-sm italic p-4 text-center font-semibold">
                            Errore di lettura: ${error.message}<br>
                            <span class="text-xs font-normal">Controlla le Rules del Realtime Database: ".read": true.</span>
                        </div>
                    `;
                });
        }

        // AGGIUNTA PAZIENTE SU FIREBASE
        async function saveNewPatient() {
            const nome = document.getElementById('new-p-name').value.trim();
            const cognome = document.getElementById('new-p-surname').value.trim();
            const note = document.getElementById('new-p-notes').value.trim();
            const saveButton = document.querySelector('button[onclick="saveNewPatient()"]');

            if(!nome || !cognome) { 
                alert("Nome e cognome obbligatori."); 
                return; 
            }

            if (!firebase.apps.length || !database) {
                alert("Errore: Firebase non è inizializzato. Controlla la configurazione firebaseConfig.");
                return;
            }

            try {
                if (saveButton) {
                    saveButton.disabled = true;
                    saveButton.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Salvataggio in corso...';
                }

                const newRef = database.ref('pazienti').push();
                await newRef.set({ 
                    nome: nome, 
                    cognome: cognome, 
                    note: note, 
                    dataCreazione: Date.now() 
                });

                document.getElementById('new-p-name').value = '';
                document.getElementById('new-p-surname').value = '';
                document.getElementById('new-p-notes').value = '';
                document.getElementById('add-patient-form').classList.add('hidden');

                alert("Paziente salvato correttamente nel database Firebase.");
                loadPatientsList();
            } catch (error) {
                console.error("Errore salvataggio Firebase:", error);
                alert(
                    "ERRORE DI SCRITTURA SU FIREBASE:\n" + error.message +
                    "\n\nControlla soprattutto le Rules del Realtime Database: devono consentire la scrittura."
                );
            } finally {
                if (saveButton) {
                    saveButton.disabled = false;
                    saveButton.innerHTML = 'Conferma e Salva in Cloud';
                }
            }
        }

        // SELEZIONE PAZIENTE E CREAZIONE SESSIONE CLINICA
        function selectPatient(id, fullname) {
            localStorage.setItem('neurocenter_active_patient_id', id);
            localStorage.setItem('neurocenter_active_patient_name', fullname);
            var sessionRandomId = 'SESS_' + Date.now();
            localStorage.setItem('neurocenter_active_session_id', sessionRandomId);
            
            // Inizializza il record sessione su Firebase
            database.ref('pazienti/' + id + '/sessioni/' + sessionRandomId).set({
                timestampInizio: Date.now(),
                dataEstesa: new Date().toLocaleDateString('it-IT')
            }).then(() => {
                checkActiveSessionState();
            }).catch((error) => {
                console.error("Errore creazione sessione Firebase:", error);
                alert("Errore nell'avvio della sessione sul database: " + error.message);
            });
        }

        function startFreeSession() {
            localStorage.setItem('neurocenter_active_patient_id', 'FREE');
            localStorage.setItem('neurocenter_active_patient_name', "Sessione Libera");
            localStorage.setItem('neurocenter_active_session_id', 'FREE');
            checkActiveSessionState();
        }

        // RENDERING GENERAZIONE CARD ESERCIZI
        function renderExercisesGrid(filter) {
            const grid = document.getElementById('exercise-grid');
            grid.innerHTML = '';
            
            const filtered = filter === 'all' ? exercises : exercises.filter(e => e.category === filter);
            
            filtered.forEach(ex => {
                const card = document.createElement('div');
                card.className = "bg-slate-900/60 backdrop-blur-md border border-slate-900 rounded-2xl p-5 flex flex-col justify-between hover:border-slate-800 hover:bg-slate-900/80 transition-all duration-300 group shadow-lg";
                card.innerHTML = `
                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <span class="p-3 bg-gradient-to-br ${ex.color} rounded-xl text-white shadow-md group-hover:scale-105 transition-transform duration-300">
                                <i class="fa-solid ${ex.icon} text-lg w-5 text-center"></i>
                            </span>
                            <span class="text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 bg-slate-800 text-slate-400 rounded-md border border-slate-700/50">
                                ${ex.category.replace('-', ' ')}
                            </span>
                        </div>
                        <h3 class="text-base font-bold text-slate-100 group-hover:text-indigo-400 transition-colors mb-1.5">${ex.title}</h3>
                        <p class="text-xs text-slate-400 leading-relaxed mb-4">${ex.description}</p>
                    </div>
                    <button onclick="launchExercise('${ex.title}', '${ex.path}')" class="w-full py-2.5 bg-slate-800 hover:bg-indigo-600 text-slate-200 hover:text-white rounded-xl text-xs font-semibold transition-all duration-200 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-play text-[10px]"></i> Avvia Modulo
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        // GESTIONE FILTRI NAVBAR
        function filterExercises(category) {
            renderExercisesGrid(category);
            const buttons = document.querySelectorAll('#filter-menu button');
            buttons.forEach(btn => {
                if(btn.getAttribute('data-filter') === category) {
                    btn.className = "w-full text-left px-3 py-2 rounded-xl text-sm font-medium transition flex items-center justify-between bg-indigo-600 text-white font-bold";
                    var badge = btn.querySelector('span:nth-child(2)');
                    if(badge) { badge.className = "text-xs bg-indigo-700 px-2 py-0.5 rounded-md"; }
                } else {
                    btn.className = "w-full text-left px-3 py-2 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-900 hover:text-white transition flex items-center justify-between";
                    var badge = btn.querySelector('span:nth-child(2)');
                    if(badge) { badge.className = "text-xs bg-slate-800 px-2 py-0.5 rounded-md text-slate-400"; }
                }
            });
        }

        // AVVIO ED ESECUZIONE MODULO CLINICO IN IFRAME
        function launchExercise(title, path) {
            currentActiveExerciseName = title;
            hasSavedViaPostMessage = false;
            document.getElementById('current-exercise-title-bar').innerText = title;
            document.getElementById('exercise-frame-container').classList.remove('hidden');
            document.getElementById('exercise-iframe').src = path;
        }

        // CHIUSURA IFRAME E COMPILAZIONE FALLBACK MARCATURA
        function closeActiveExercise() {
            var pId = localStorage.getItem('neurocenter_active_patient_id');
            var sId = localStorage.getItem('neurocenter_active_session_id');
            
            // Fallback: Se l'esercizio non ha trasmesso i dati via postMessage, scrive la marcatura standard temporale
            if (pId && sId && pId !== 'FREE' && currentActiveExerciseName !== "" && !hasSavedViaPostMessage) {
                var cleanDbKey = currentActiveExerciseName.replace(/ /g, '_');
                var timestampCorrente = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                
                database.ref('pazienti/' + pId + '/sessioni/' + sId + '/esercizi/' + cleanDbKey).set({
                    summary: "Eseguito alle " + timestampCorrente + " (In-App)",
                    timestamp: Date.now()
                }).catch((error) => {
                    console.error("Errore fallback salvataggio esercizio:", error);
                });
            }
            
            currentActiveExerciseName = "";
            document.getElementById('exercise-frame-container').classList.add('hidden');
            document.getElementById('exercise-iframe').src = "about:blank";
        }

        function toggleAddPatientForm() {
            var form = document.getElementById('add-patient-form');
            form.classList.toggle('hidden');
        }

        function returnToHomeReal() {
            localStorage.removeItem('neurocenter_active_patient_id');
            localStorage.removeItem('neurocenter_active_session_id');
            localStorage.removeItem('neurocenter_active_patient_name');
            window.location.reload();
        }
    </script>
</body>
</html>
