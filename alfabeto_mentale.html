<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfabeto Mentale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .card-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        .timer-ring {
            transition: stroke-dashoffset 0.1s linear;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden min-h-[600px] flex flex-col relative">
        
        <!-- Schermata Iniziale -->
        <div id="menu-screen" class="p-8 flex-1 flex flex-col justify-center">
            <div class="text-center mb-10">
                <div class="inline-block p-4 bg-indigo-100 rounded-2xl mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                </div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Alfabeto Mentale</h1>
                <p class="text-gray-500 mt-2">Allena la tua mente ordinando le parole.</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3">Difficoltà</label>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="setDifficulty('intermediate')" id="btn-inter" class="difficulty-btn py-3 px-4 rounded-xl border-2 border-indigo-600 bg-indigo-50 text-indigo-700 font-bold transition-all">
                            Intermedio<br><span class="text-xs font-normal">3 parole corte</span>
                        </button>
                        <button onclick="setDifficulty('advanced')" id="btn-adv" class="difficulty-btn py-3 px-4 rounded-xl border-2 border-gray-100 text-gray-500 font-bold hover:border-indigo-200 transition-all">
                            Avanzato<br><span class="text-xs font-normal">5 parole lunghe</span>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3">Durata Sessione</label>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="setRounds(5)" id="btn-r5" class="round-btn py-3 px-4 rounded-xl border-2 border-indigo-600 bg-indigo-50 text-indigo-700 font-bold transition-all">
                            5 Round
                        </button>
                        <button onclick="setRounds(10)" id="btn-r10" class="round-btn py-3 px-4 rounded-xl border-2 border-gray-100 text-gray-500 font-bold hover:border-indigo-200 transition-all">
                            10 Round
                        </button>
                    </div>
                </div>

                <button onclick="startGame()" class="w-full card-gradient text-white font-bold py-4 rounded-2xl shadow-lg hover:opacity-90 transition-all mt-4 transform hover:scale-[1.02]">
                    INIZIA SFIDA
                </button>
            </div>
        </div>

        <!-- Schermata Memorizzazione -->
        <div id="memo-screen" class="hidden p-8 flex-1 flex flex-col items-center justify-center text-center">
            <div class="mb-8 relative">
                <svg class="w-24 h-24 transform -rotate-90">
                    <circle cx="48" cy="48" r="40" stroke="currentColor" stroke-width="8" fill="transparent" class="text-gray-200" />
                    <circle id="timer-progress" cx="48" cy="48" r="40" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="251.2" stroke-dashoffset="0" class="text-indigo-600 timer-ring" />
                </svg>
                <span id="timer-text" class="absolute inset-0 flex items-center justify-center text-2xl font-bold text-gray-800">10</span>
            </div>
            <h2 class="text-lg font-medium text-gray-500 mb-6 uppercase tracking-widest">Memorizza queste parole:</h2>
            <div id="word-list-memo" class="space-y-4 w-full mb-10">
                <!-- Parole caricate via JS -->
            </div>
            <button onclick="resetApp()" class="w-full py-3 px-4 rounded-xl border-2 border-gray-100 text-gray-400 hover:text-gray-600 hover:border-gray-200 font-semibold transition-all flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
                ABBANDONA SFIDA
            </button>
        </div>

        <!-- Schermata Recupero (Input) -->
        <div id="recall-screen" class="hidden p-8 flex-1 flex flex-col">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-900">Ricostruisci la lista</h2>
                <p class="text-gray-500 text-sm">Inserisci in <b>ordine alfabetico</b>.</p>
            </div>
            
            <div id="input-container" class="space-y-4 mb-8">
                <!-- Input dinamici -->
            </div>

            <div class="mt-auto space-y-3">
                <button onclick="checkAnswers()" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-gray-800 transition-all">
                    CONFERMA ORDINE
                </button>
                <button onclick="resetApp()" class="w-full py-3 text-gray-400 hover:text-gray-600 font-semibold text-sm">
                    Torna al menu principale
                </button>
            </div>
        </div>

        <!-- Schermata Risultato Round -->
        <div id="result-screen" class="hidden p-8 flex-1 flex flex-col">
            <div id="result-header" class="text-center mb-8">
                <!-- Icona e titolo caricati via JS -->
            </div>

            <div class="bg-gray-50 rounded-2xl p-6 mb-8 overflow-y-auto max-h-[300px]">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-xs font-bold text-gray-400 uppercase">
                            <th class="pb-3">Tua Risposta</th>
                            <th class="pb-3 text-right">Corretta (A-Z)</th>
                        </tr>
                    </thead>
                    <tbody id="result-table-body" class="text-sm">
                        <!-- Righe caricate via JS -->
                    </tbody>
                </table>
            </div>

            <div class="space-y-3">
                <button id="next-btn" onclick="nextRound()" class="w-full card-gradient text-white font-bold py-4 rounded-2xl shadow-lg hover:opacity-90 transition-all">
                    PROSSIMO ROUND
                </button>
                <button onclick="resetApp()" class="w-full py-3 text-gray-400 hover:text-gray-600 font-semibold text-sm">
                    Termina sessione e torna al menu
                </button>
            </div>
        </div>

        <!-- Schermata Finale -->
        <div id="final-screen" class="hidden p-8 flex-1 flex flex-col items-center justify-center text-center">
            <div class="mb-6">
                <div class="text-6xl mb-4">🏆</div>
                <h2 class="text-3xl font-extrabold text-gray-900">Sessione Finita!</h2>
                <p class="text-gray-500 mt-2">Ottimo lavoro per la tua memoria.</p>
            </div>
            
            <div class="bg-indigo-50 rounded-3xl p-8 w-full mb-8">
                <div class="text-sm text-indigo-600 font-bold uppercase mb-1">Punteggio Totale</div>
                <div class="text-5xl font-black text-indigo-900"><span id="final-score">0</span> / <span id="final-total">0</span></div>
            </div>

            <button onclick="resetApp()" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl hover:bg-black transition-all shadow-md">
                TORNA AL MENU PRINCIPALE
            </button>
        </div>

    </div>

    <script>
        const wordPoolShort = [
            "Sole", "Ape", "Mare", "Pane", "Luna", "Cane", "Vino", "Casa", "Erba", "Faro", 
            "Gatto", "Isola", "Luce", "Mela", "Nido", "Orso", "Pera", "Rana", "Sera", "Tubo"
        ];
        
        const wordPoolLong = [
            "Elefante", "Computer", "Bottiglia", "Finestra", "Tavolo", "Orizzonte", "Calendario", 
            "Lampadario", "Montagna", "Aeroplano", "Biblioteca", "Dizionario", "Margherita", 
            "Pianoforte", "Semaforo", "Quadrifoglio", "Università", "Ventilatore", "Zafferano", "Astronauta"
        ];

        let config = {
            difficulty: 'intermediate',
            rounds: 5
        };

        let gameState = {
            currentRound: 1,
            score: 0,
            targetWords: [],
            sortedWords: [],
            userWords: [],
            timer: 10,
            interval: null
        };

        // UI Management
        function setDifficulty(diff) {
            config.difficulty = diff;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('border-indigo-600', 'bg-indigo-50', 'text-indigo-700');
                btn.classList.add('border-gray-100', 'text-gray-500');
            });
            const activeBtn = diff === 'intermediate' ? 'btn-inter' : 'btn-adv';
            document.getElementById(activeBtn).classList.add('border-indigo-600', 'bg-indigo-50', 'text-indigo-700');
            document.getElementById(activeBtn).classList.remove('border-gray-100', 'text-gray-500');
        }

        function setRounds(n) {
            config.rounds = n;
            document.querySelectorAll('.round-btn').forEach(btn => {
                btn.classList.remove('border-indigo-600', 'bg-indigo-50', 'text-indigo-700');
                btn.classList.add('border-gray-100', 'text-gray-500');
            });
            const activeBtn = n === 5 ? 'btn-r5' : 'btn-r10';
            document.getElementById(activeBtn).classList.add('border-indigo-600', 'bg-indigo-50', 'text-indigo-700');
            document.getElementById(activeBtn).classList.remove('border-gray-100', 'text-gray-500');
        }

        function showScreen(screenId) {
            ['menu-screen', 'memo-screen', 'recall-screen', 'result-screen', 'final-screen'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }

        // Core Game Logic
        function startGame() {
            gameState.currentRound = 1;
            gameState.score = 0;
            startRound();
        }

        function startRound() {
            const pool = config.difficulty === 'intermediate' ? wordPoolShort : wordPoolLong;
            const count = config.difficulty === 'intermediate' ? 3 : 5;
            
            // Seleziona parole casuali
            gameState.targetWords = [...pool].sort(() => 0.5 - Math.random()).slice(0, count);
            gameState.sortedWords = [...gameState.targetWords].sort((a, b) => a.localeCompare(b, 'it', { sensitivity: 'base' }));
            
            // Prepara UI Memo
            const listMemo = document.getElementById('word-list-memo');
            listMemo.innerHTML = gameState.targetWords.map(w => `
                <div class="bg-white border-2 border-indigo-100 p-4 rounded-2xl text-xl font-bold text-indigo-900 shadow-sm">${w}</div>
            `).join('');

            showScreen('memo-screen');
            startTimer();
        }

        function startTimer() {
            gameState.timer = 10;
            updateTimerUI();
            
            if (gameState.interval) clearInterval(gameState.interval);
            gameState.interval = setInterval(() => {
                gameState.timer -= 0.1;
                if (gameState.timer <= 0) {
                    clearInterval(gameState.interval);
                    prepareRecall();
                }
                updateTimerUI();
            }, 100);
        }

        function updateTimerUI() {
            const text = document.getElementById('timer-text');
            const progress = document.getElementById('timer-progress');
            const displayTime = Math.max(0, Math.ceil(gameState.timer));
            text.innerText = displayTime;
            
            const offset = 251.2 - (251.2 * (gameState.timer / 10));
            progress.style.strokeDashoffset = offset;
        }

        function prepareRecall() {
            const container = document.getElementById('input-container');
            container.innerHTML = gameState.targetWords.map((_, i) => `
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 font-bold">${i+1}</span>
                    <input type="text" placeholder="Parola..." class="recall-input w-full pl-10 pr-4 py-4 rounded-xl border-2 border-gray-100 focus:border-indigo-500 focus:outline-none transition-all" autocomplete="off">
                </div>
            `).join('');
            
            showScreen('recall-screen');
            // Focus sul primo input
            setTimeout(() => {
                const firstInput = document.querySelector('.recall-input');
                if (firstInput) firstInput.focus();
            }, 100);
        }

        function checkAnswers() {
            const inputs = document.querySelectorAll('.recall-input');
            gameState.userWords = Array.from(inputs).map(input => input.value.trim());
            
            let isCorrect = true;
            const tableBody = document.getElementById('result-table-body');
            tableBody.innerHTML = '';

            gameState.sortedWords.forEach((correct, i) => {
                const user = gameState.userWords[i] || "";
                const match = user.toLowerCase() === correct.toLowerCase();
                if (!match) isCorrect = false;

                tableBody.innerHTML += `
                    <tr class="border-b border-gray-100">
                        <td class="py-4 font-medium ${match ? 'text-green-600' : 'text-red-500'}">
                            ${user || '---'}
                            ${match ? ' ✓' : ' ✗'}
                        </td>
                        <td class="py-4 text-right font-bold text-gray-900">${correct}</td>
                    </tr>
                `;
            });

            const header = document.getElementById('result-header');
            if (isCorrect) {
                gameState.score++;
                header.innerHTML = `
                    <div class="text-5xl mb-2">✨</div>
                    <h2 class="text-2xl font-bold text-green-600">Perfetto!</h2>
                    <p class="text-gray-500">Hai ordinato tutto correttamente.</p>
                `;
            } else {
                header.innerHTML = `
                    <div class="text-5xl mb-2">🧠</div>
                    <h2 class="text-2xl font-bold text-gray-900">Quasi!</h2>
                    <p class="text-gray-500">Guarda le differenze sotto.</p>
                `;
            }

            const nextBtn = document.getElementById('next-btn');
            if (gameState.currentRound >= config.rounds) {
                nextBtn.innerText = "VEDI RISULTATO FINALE";
            } else {
                nextBtn.innerText = "PROSSIMO ROUND";
            }

            showScreen('result-screen');
        }

        function nextRound() {
            if (gameState.currentRound >= config.rounds) {
                showFinalResults();
            } else {
                gameState.currentRound++;
                startRound();
            }
        }

        function showFinalResults() {
            document.getElementById('final-score').innerText = gameState.score;
            document.getElementById('final-total').innerText = config.rounds;
            showScreen('final-screen');
        }

        function resetApp() {
            if (gameState.interval) clearInterval(gameState.interval);
            showScreen('menu-screen');
        }

        // Inizializzazione
        window.onload = () => {
            // Pre-selezione di default
            setDifficulty('intermediate');
            setRounds(5);
        };
    </script>
</body>
</html>
